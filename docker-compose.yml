services:
  app:
    build: .
    container_name: share_cost_app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/share_cost
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
      OLLAMA_URL: ${OLLAMA_URL:-https://api.ollama.com}
      OLLAMA_API_TOKEN: ${OLLAMA_API_TOKEN:-}
      OLLAMA_LOCAL_URL: ${OLLAMA_LOCAL_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: share_cost_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 4G

  nginx:
    build: ./nginx
    container_name: share_cost_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: share_cost_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: share_cost
    # No ports exposed — only reachable by the app service on the internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  letsencrypt_data:
  certbot_webroot:
  ollama_data:
